services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ttrpg-social-app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    volumes:
      - ./:/var/www/html
      - composer_vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(file_exists('vendor/autoload.php') ? 0 : 1);\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${FORWARD_APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ttrpg_social}
      MYSQL_USER: ${DB_USERNAME:-ttrpg}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ttrpg}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${FORWARD_DB_PORT:-33060}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${FORWARD_REDIS_PORT:-63790}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  queue:
    image: ttrpg-social-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: php artisan queue:work --verbose --tries=1 --timeout=90
    volumes:
      - ./:/var/www/html
      - composer_vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverb:
    image: ttrpg-social-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "${FORWARD_REVERB_PORT:-8081}:8080"
    volumes:
      - ./:/var/www/html
      - composer_vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: ["/bin/sh", "/var/www/html/docker/node/entrypoint.sh"]
    command: ["npm", "run", "dev", "--", "--host=0.0.0.0", "--port=5173"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NPM_CONFIG_CACHE: /root/.npm
    ports:
      - "${FORWARD_VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
      - npm_cache:/root/.npm

volumes:
  composer_cache:
  composer_vendor:
  mysql_data:
  node_modules:
  npm_cache:
  redis_data:
