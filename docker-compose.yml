x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-TTRPG Social}
  APP_ENV: ${APP_ENV:-local}
  APP_KEY: ${APP_KEY:-}
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_URL: http://localhost:${FORWARD_APP_PORT:-8080}
  APP_LOCALE: ${APP_LOCALE:-en}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
  APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-en_US}
  APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
  BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_STACK: ${LOG_STACK:-single}
  LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DOCKER_DB_DATABASE:-ttrpg_social}
  DB_USERNAME: ${DOCKER_DB_USERNAME:-ttrpg}
  DB_PASSWORD: ${DOCKER_DB_PASSWORD:-ttrpg}
  SESSION_DRIVER: database
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
  SESSION_PATH: ${SESSION_PATH:-/}
  SESSION_DOMAIN: ${SESSION_DOMAIN:-null}
  BROADCAST_CONNECTION: reverb
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  MEMCACHED_HOST: ${MEMCACHED_HOST:-127.0.0.1}
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
  REDIS_PORT: 6379
  MAIL_MAILER: ${MAIL_MAILER:-log}
  MAIL_SCHEME: ${MAIL_SCHEME:-null}
  MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
  MAIL_PORT: ${MAIL_PORT:-2525}
  MAIL_USERNAME: ${MAIL_USERNAME:-null}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-${APP_NAME:-TTRPG Social}}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  AWS_BUCKET: ${AWS_BUCKET:-}
  AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
  VITE_APP_NAME: ${APP_NAME:-TTRPG Social}
  REVERB_APP_ID: ${REVERB_APP_ID:-ttrpg-social}
  REVERB_APP_KEY: ${REVERB_APP_KEY:-ttrpg-social-key}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET:-ttrpg-social-secret}
  REVERB_HOST: reverb
  REVERB_PORT: 8080
  REVERB_SCHEME: http
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: 8080
  REVERB_PULSE_INGEST_INTERVAL: ${REVERB_PULSE_INGEST_INTERVAL:-15}
  REVERB_TELESCOPE_INGEST_INTERVAL: ${REVERB_TELESCOPE_INGEST_INTERVAL:-15}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ttrpg-social-app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      <<: *app-environment
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    volumes:
      - ./:/var/www/html
      - composer_vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(file_exists('vendor/autoload.php') ? 0 : 1);\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${FORWARD_APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DOCKER_DB_DATABASE:-ttrpg_social}
      MYSQL_USER: ${DOCKER_DB_USERNAME:-ttrpg}
      MYSQL_PASSWORD: ${DOCKER_DB_PASSWORD:-ttrpg}
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-root}
    ports:
      - "${FORWARD_DB_PORT:-33060}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${FORWARD_REDIS_PORT:-63790}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  queue:
    image: ttrpg-social-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      <<: *app-environment
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    command: php artisan queue:work --verbose --tries=1 --timeout=90
    volumes:
      - ./:/var/www/html
      - composer_vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  reverb:
    image: ttrpg-social-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      <<: *app-environment
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "${FORWARD_REVERB_PORT:-8081}:8080"
    volumes:
      - ./:/var/www/html
      - composer_vendor:/var/www/html/vendor
      - composer_cache:/tmp/composer-cache
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    entrypoint: ["/bin/sh", "/var/www/html/docker/node/entrypoint.sh"]
    command: ["npm", "run", "dev", "--", "--host=0.0.0.0", "--port=5173"]
    environment:
      APP_URL: http://localhost:${FORWARD_APP_PORT:-8080}
      VITE_APP_NAME: ${APP_NAME:-TTRPG Social}
      VITE_DEV_SERVER_PORT: ${FORWARD_VITE_PORT:-5173}
      VITE_HMR_HOST: localhost
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-ttrpg-social-key}
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: ${FORWARD_REVERB_PORT:-8081}
      VITE_REVERB_SCHEME: http
      CHOKIDAR_USEPOLLING: "true"
      NPM_CONFIG_CACHE: /root/.npm
    ports:
      - "${FORWARD_VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
      - npm_cache:/root/.npm

volumes:
  composer_cache:
  composer_vendor:
  mysql_data:
  node_modules:
  npm_cache:
  redis_data:
